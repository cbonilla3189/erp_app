{% extends "panel_base.html" %}
{% block title %}Nuevo inventario — aruna{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <div class="section-title" style="margin-bottom:0">
      <i class="bi bi-plus-square"></i> Nuevo inventario
    </div>
    <a href="{{ url_for('lista_inventarios') }}" class="btn-act btn-edit">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>
  <div class="panel-card">
    <div class="panel-card-header">
      <h5><i class="bi bi-boxes"></i> Datos del inventario</h5>
    </div>
    <div style="padding:1.75rem">
      <form method="POST">
        <div class="fi-group" style="margin-bottom:1rem">
          <label style="font-size:.78rem;font-weight:700;color:#3d1a6e">Nombre *</label>
          <input type="text" name="nombre" placeholder="Ej. Equipos IT, Suministros, Cocina" required
            style="padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;width:100%">
        </div>
        <div class="fi-group" style="margin-bottom:1rem">
          <label style="font-size:.78rem;font-weight:700;color:#3d1a6e">Descripción</label>
          <textarea name="descripcion" placeholder="Describe qué contiene este inventario..." rows="3"
            style="padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;width:100%;resize:vertical"></textarea>
        </div>
        <div class="fi-group" style="margin-bottom:1.75rem">
          <label style="font-size:.78rem;font-weight:700;color:#3d1a6e">Color identificador</label>
          <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.25rem">
            {% for color in ["#561d9c","#1a7a4a","#b91c1c","#92400e","#1d4ed8","#0f766e","#be185d","#374151"] %}
            <label style="cursor:pointer">
              <input type="radio" name="color" value="{{ color }}" {% if loop.first %}checked{% endif %} style="display:none">
              <div class="color-opt" style="width:32px;height:32px;border-radius:50%;background:{{ color }};border:3px solid transparent;transition:all .15s"
                onclick="selectColor(this, '{{ color }}')"></div>
            </label>
            {% endfor %}
          </div>
        </div>
        <button type="submit" style="width:100%;padding:.85rem;background:linear-gradient(135deg,#561d9c,#8b3fe3);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer">
          <i class="bi bi-plus-lg"></i> Crear inventario
        </button>
      </form>
    </div>
  </div>
</div>
<script>
function selectColor(el, color) {
  document.querySelectorAll(".color-opt").forEach(d => d.style.border = "3px solid transparent");
  el.style.border = "3px solid #2d0060";
  document.querySelectorAll("input[name=color]").forEach(r => r.checked = r.value === color);
}
document.addEventListener("DOMContentLoaded", () => {
  document.querySelector(".color-opt").style.border = "3px solid #2d0060";
});
</script>
{% endblock %}
