{% extends "panel_base.html" %}
{% block title %}Nueva oportunidad — aruna{% endblock %}
{% block content %}
<div style="max-width:620px;margin:0 auto">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <div class="section-title" style="margin-bottom:0"><i class="bi bi-graph-up-arrow"></i> Nueva oportunidad</div>
    <a href="{{ url_for('crm') }}" class="btn-act btn-edit"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="panel-card">
    <div class="panel-card-header"><h5><i class="bi bi-graph-up"></i> Datos de la oportunidad</h5></div>
    <div style="padding:1.75rem">
      <form method="POST">
        <div class="fi-group" style="margin-bottom:1rem">
          <label>Titulo *</label>
          <input type="text" name="titulo" placeholder="Ej. Venta equipos IT - Oxford" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div class="fi-group">
            <label>Contacto</label>
            <select name="contacto_id" style="padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;height:40px">
              <option value="">— Sin contacto —</option>
              {% for c in contactos %}
              <option value="{{ c.id }}">{{ c.nombre }} {{ c.apellido or '' }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="fi-group">
            <label>Responsable</label>
            <select name="responsable_id" style="padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;height:40px">
              {% for u in usuarios_empresa %}
              <option value="{{ u.id }}">{{ u.nombre }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div class="fi-group"><label>Valor ($)</label><input type="number" name="valor" min="0" step="0.01" value="0"></div>
          <div class="fi-group">
            <label>Etapa</label>
            <select name="etapa" style="padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;height:40px">
              <option value="prospecto">Prospecto</option>
              <option value="contactado">Contactado</option>
              <option value="propuesta">Propuesta</option>
              <option value="negociacion">Negociacion</option>
            </select>
          </div>
          <div class="fi-group"><label>Probabilidad (%)</label><input type="number" name="probabilidad" min="0" max="100" value="0"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div class="fi-group"><label>Fecha cierre estimada</label><input type="date" name="fecha_cierre"></div>
        </div>
        <div class="fi-group" style="margin-bottom:1.75rem">
          <label>Notas</label>
          <textarea name="notas" rows="3"
            style="padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;width:100%;resize:vertical"></textarea>
        </div>
        <button type="submit" style="width:100%;padding:.85rem;background:linear-gradient(135deg,#561d9c,#8b3fe3);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer">
          <i class="bi bi-plus-lg"></i> Crear oportunidad
        </button>
      </form>
    </div>
  </div>
</div>
<style>
.fi-group{display:flex;flex-direction:column;gap:.3rem}
.fi-group label{font-size:.78rem;font-weight:700;color:#3d1a6e}
.fi-group input{padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;height:40px;width:100%}
</style>
{% endblock %}
