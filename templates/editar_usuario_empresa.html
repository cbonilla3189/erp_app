{% extends "panel_base.html" %}
{% block title %}Editar usuario — aruna{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <div class="section-title" style="margin-bottom:0"><i class="bi bi-pencil-square"></i> Editar usuario</div>
    <a href="{{ url_for('mi_empresa') }}" class="btn-act btn-edit"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="panel-card">
    <div class="panel-card-header">
      <h5><i class="bi bi-person"></i> {{ user_data.nombre }} {{ user_data.apellido }}</h5>
      <span class="count">{{ user_data.username }}</span>
    </div>
    <div style="padding:1.75rem">
      <form method="POST">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div class="fi-group"><label>Nombre *</label><input type="text" name="nombre" value="{{ user_data.nombre }}" required></div>
          <div class="fi-group"><label>Apellido *</label><input type="text" name="apellido" value="{{ user_data.apellido }}" required></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.75rem">
          <div class="fi-group"><label>Correo</label><input type="email" name="correo" value="{{ user_data.correo or '' }}"></div>
          <div class="fi-group"><label>Telefono</label><input type="text" name="telefono" value="{{ user_data.telefono or '' }}"></div>
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end">
          <a href="{{ url_for('mi_empresa') }}" class="btn-act btn-edit" style="padding:.5rem 1.25rem">Cancelar</a>
          <button type="submit" style="padding:.5rem 1.25rem;background:linear-gradient(135deg,#561d9c,#8b3fe3);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer">
            <i class="bi bi-check-lg"></i> Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<style>
.fi-group{display:flex;flex-direction:column;gap:.3rem}
.fi-group label{font-size:.78rem;font-weight:700;color:#3d1a6e}
.fi-group input{padding:.6rem .85rem;border:1.5px solid #e2d6f3;border-radius:10px;font-size:.9rem;color:#1a0035;background:#fdf9ff;outline:none;height:40px;width:100%}
.fi-group input:focus{border-color:#8b3fe3;box-shadow:0 0 0 3px rgba(139,63,227,.1)}
</style>
{% endblock %}
